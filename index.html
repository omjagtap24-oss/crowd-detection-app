<!DOCTYPE html>
<html>
<head>
    <title>Crowd Detection App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .crowd-btn {
            background-color: #007bff;
            color: white;
        }

        .predict-btn {
            background-color: #28a745;
            color: white;
        }

        .result {
            font-size: 18px;
            margin-top: 10px;
            font-weight: bold;
        }

        .map {
            background: #ddd;
            height: 200px;
            margin: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
        }
    </style>

</head>

<body>

    <h1>🛕 Crowd Detection System</h1>

    <!-- Fake Map UI -->
    <div class="map">
        Map Area (Temple Zone Visualization)
    </div>

    <div class="card">
        <button class="crowd-btn" onclick="getCrowd()">Check Crowd</button>
        <div id="crowd" class="result"></div>
    </div>

    <div class="card">
        <button class="predict-btn" onclick="getPrediction()">Best Time</button>
        <div id="predict" class="result"></div>
    </div>

    <script>
        function getCrowd() {
            fetch('/crowd')
            .then(res => res.json())
            .then(data => {
                let color = "green";

                if (data.crowd_level === "High") color = "red";
                else if (data.crowd_level === "Medium") color = "orange";

                document.getElementById('crowd').innerHTML =
                    "Crowd Level: <span style='color:" + color + "'>" +
                    data.crowd_level + "</span>";
            });
        }

        function getPrediction() {
            fetch('/predict')
            .then(res => res.json())
            .then(data => {
                document.getElementById('predict').innerHTML =
                    "Best Time: " + data.best_time;
            });
        }
    </script>

</body>
</html>
