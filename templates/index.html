<!DOCTYPE html>
<html>
<head>
    <title>Crowd Detection App</title>
</head>
<body style="text-align:center; font-family:Arial;">

    <h1>Crowd Detection System</h1>

    <button onclick="getCrowd()">Check Crowd</button>
    <p id="crowd"></p>

    <br>

    <button onclick="getPrediction()">Best Time</button>
    <p id="predict"></p>

    <script>
        function getCrowd() {
            fetch('/crowd')
            .then(res => res.json())
            .then(data => {
                document.getElementById('crowd').innerText =
                "Crowd Level: " + data.crowd_level;
            });
        }

        function getPrediction() {
            fetch('/predict')
            .then(res => res.json())
            .then(data => {
                document.getElementById('predict').innerText =
                "Best Time: " + data.best_time;
            });
        }
    </script>

</body>
</html>
