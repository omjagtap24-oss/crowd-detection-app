<!DOCTYPE html>
<html>
<head>
    <title>Crowd Detection App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f0f2f5;
            margin: 0;
        }

        h1 {
            background: #2c3e50;
            color: white;
            padding: 15px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 12px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .crowd-btn {
            background-color: #007bff;
            color: white;
        }

        .predict-btn {
            background-color: #28a745;
            color: white;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🛕 Crowd Detection System</h1>

    <div class="card">
        <button class="crowd-btn" onclick="getCrowd()">Check Crowd</button>
        <div id="crowd" class="result"></div>
    </div>

    <div class="card">
        <button class="predict-btn" onclick="getPrediction()">Best Time</button>
        <div id="predict" class="result"></div>
    </div>

    <script>
        function getCrowd() {
            fetch('/crowd')
            .then(res => res.json())
            .then(data => {
                let color = "green";

                if (data.crowd_level === "High") color = "red";
                else if (data.crowd_level === "Medium") color = "orange";

                document.getElementById("crowd").innerHTML =
                    "Crowd: <span style='color:" + color + "'>" +
                    data.crowd_level + "</span><br>" +
                    data.suggestion;
            });
        }

        function getPrediction() {
            fetch('/predict')
            .then(res => res.json())
            .then(data => {
                document.getElementById("predict").innerHTML =
                    "Best Time: " + data.best_time;
            });
        }
    </script>

</body>
</html>
