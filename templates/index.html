<!DOCTYPE html>
<html>
<head>
    <title>Crowd Detection Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { margin: 0; font-family: Arial; }

        #map { height: 90vh; width: 100%; }

        .top-bar {
            text-align: center;
            padding: 10px;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>

<body>

<div class="top-bar">
    <h2>🛕 Smart Crowd Detection Map</h2>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([18.5204, 73.8567], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var temples = [
        {name: "Shirdi Sai Baba", coords: [19.7669, 74.4774]},
        {name: "Tirupati Balaji", coords: [13.6288, 79.4192]},
        {name: "Siddhivinayak", coords: [19.0176, 72.8305]}
    ];

    function getColor(level) {
        if (level === "High") return "red";
        if (level === "Medium") return "orange";
        return "green";
    }

    temples.forEach(t => {

        var marker = L.marker(t.coords).addTo(map);

        marker.on("click", function() {

            fetch('/crowd')
            .then(res => res.json())
            .then(data => {

                var color = getColor(data.crowd_level);

                var popupContent = `
                    <b>${t.name}</b><br>
                    Crowd: <span style="color:${color}">${data.crowd_level}</span><br>
                    ${data.suggestion}
                `;

                marker.bindPopup(popupContent).openPopup();
            });

        });
    });

</script>

</body>
</html>
