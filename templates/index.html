<!DOCTYPE html>
<html>
<head>
    <title>Smart Crowd Detection</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .top-bar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .panel {
            position: absolute;
            top: 70px;
            left: 20px;
            width: 300px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-btn { background: #3b82f6; color: white; }
        .crowd-btn { background: #ef4444; color: white; }
        .predict-btn { background: #22c55e; color: white; }

        #suggestions {
            background: white;
            color: black;
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
        }

        #result {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="top-bar">
    🛕 Smart Crowd Detection System
</div>

<div class="panel">

    🔍 <input type="text" id="search" placeholder="Search temple..." oninput="showSuggestions()">
    <div id="suggestions"></div>

    <button class="search-btn" onclick="searchTemple()">Search</button>

    <button onclick="useLocation()" style="background:#06b6d4;color:white;">
        📍 Use My Location
    </button>

    <button class="crowd-btn" onclick="getCrowd()">Check Crowd</button>
    <button class="predict-btn" onclick="getPrediction()">Best Time</button>

    <div id="result"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([20.5937, 78.9629], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var selectedTemple = "Shirdi";

    function getColor(level) {
        if (level === "High") return "#ef4444";
        if (level === "Medium") return "#f59e0b";
        return "#22c55e";
    }

    function showResult(data) {
        document.getElementById("result").innerHTML =
            "<b>" + data.temple + "</b><br>" +
            "Crowd: <span style='color:" + getColor(data.crowd_level) + "'>" +
            data.crowd_level + "</span><br>" +
            data.suggestion;
    }

    // 🔍 SEARCH
    function searchTemple() {
        var query = document.getElementById("search").value;

        fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + query + " temple india")
        .then(res => res.json())
        .then(data => {

            if (data.length > 0) {
                var lat = data[0].lat;
                var lon = data[0].lon;

                map.setView([lat, lon], 13);

                L.marker([lat, lon]).addTo(map)
                    .bindPopup(query)
                    .openPopup();

                selectedTemple = query;
            }
        });
    }

    // 🔍 AUTO SUGGESTIONS
    function showSuggestions() {
        var query = document.getElementById("search").value;

        if (query.length < 3) {
            document.getElementById("suggestions").innerHTML = "";
            return;
        }

        fetch("https://nominatim.openstreetmap.org/search?format=json&limit=5&q=" + query + " temple India")
        .then(res => res.json())
        .then(data => {

            let suggestions = "";

            data.forEach(place => {
                suggestions += `
                    <div style="padding:5px;cursor:pointer;"
                    onclick="selectSuggestion('${place.display_name}', ${place.lat}, ${place.lon})">
                    ${place.display_name}
                    </div>
                `;
            });

            document.getElementById("suggestions").innerHTML = suggestions;
        });
    }

    function selectSuggestion(name, lat, lon) {
        document.getElementById("search").value = name;
        document.getElementById("suggestions").innerHTML = "";

        map.setView([lat, lon], 13);

        L.marker([lat, lon]).addTo(map)
            .bindPopup(name)
            .openPopup();

        selectedTemple = name;
    }

    // 📍 LOCATION
    function useLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {

                var lat = position.coords.latitude;
                var lon = position.coords.longitude;

                map.setView([lat, lon], 13);

                L.marker([lat, lon]).addTo(map)
                    .bindPopup("You are here")
                    .openPopup();

                selectedTemple = "Nearby Temple";

            });
        }
    }

    // 🔴 CROWD
    function getCrowd() {
        fetch('/crowd/' + selectedTemple)
        .then(res => res.json())
        .then(data => showResult(data));
    }

    // ⏰ BEST TIME
    function getPrediction() {
        fetch('/predict/' + selectedTemple)
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerHTML =
                "<b>" + data.temple + "</b><br>" +
                "Best Time: " + data.best_time;
        });
    }
</script>

</body>
</html>
