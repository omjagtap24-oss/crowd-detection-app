<!DOCTYPE html>
<html>
<head>
    <title>Smart Crowd Detection</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        /* Control Panel */
        .panel {
            position: absolute;
            top: 70px;
            left: 20px;
            width: 280px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-btn { background: #3b82f6; color: white; }
        .crowd-btn { background: #ef4444; color: white; }
        .predict-btn { background: #22c55e; color: white; }

        #result {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="top-bar">
    🛕 Smart Crowd Detection System
</div>

<div class="panel">
    🔍 <input type="text" id="search" placeholder="Search temple...">
    <button class="search-btn" onclick="searchTemple()">Search</button>

    <button class="crowd-btn" onclick="getCrowd()">Check Crowd</button>
    <button class="predict-btn" onclick="getPrediction()">Best Time</button>

    <div id="result"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([18.5204, 73.8567], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var temples = [
        {key: "shirdi", name: "Shirdi Sai Baba", coords: [19.7669, 74.4774]},
        {key: "tirupati", name: "Tirupati Balaji", coords: [13.6288, 79.4192]},
        {key: "siddhivinayak", name: "Siddhivinayak", coords: [19.0176, 72.8305]}
    ];

    var selectedTemple = "shirdi";
    var markers = [];

    function getColor(level) {
        if (level === "High") return "#ef4444";
        if (level === "Medium") return "#f59e0b";
        return "#22c55e";
    }

    temples.forEach(t => {
        var marker = L.marker(t.coords).addTo(map).bindPopup(t.name);

        marker.on("click", function() {
            selectedTemple = t.key;
            fetch('/crowd/' + t.key)
            .then(res => res.json())
            .then(data => showResult(data));
        });

        markers.push({name: t.name.toLowerCase(), key: t.key, marker: marker});
    });

    function showResult(data) {
        document.getElementById("result").innerHTML =
            "<b>" + data.temple + "</b><br>" +
            "Crowd: <span style='color:" + getColor(data.crowd_level) + "'>" +
            data.crowd_level + "</span><br>" +
            data.suggestion;
    }

    function searchTemple() {
        var input = document.getElementById("search").value.toLowerCase();
        var found = markers.find(t => t.name.includes(input));

        if (found) {
            selectedTemple = found.key;
            map.setView(found.marker.getLatLng(), 10);
            found.marker.openPopup();
        } else {
            alert("Temple not found");
        }
    }

    function getCrowd() {
        fetch('/crowd/' + selectedTemple)
        .then(res => res.json())
        .then(data => showResult(data));
    }

    function getPrediction() {
        fetch('/predict/' + selectedTemple)
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerHTML =
                "<b>" + data.temple + "</b><br>" +
                "Best Time: " + data.best_time;
        });
    }
</script>

</body>
</html>
